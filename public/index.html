<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>Shit Happens — Online</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💩</text></svg>"
    />
  </head>
  <body>
    <!-- LANDING -->
    <section id="screen-landing" class="screen">
      <div class="hero">
        <h1>💩 Shit Happens</h1>
        <p class="tagline">Rank life's miseries from bad to absolute catastrophe.</p>
      </div>

      <div class="card-panel">
        <label>Your name</label>
        <input id="name-input" type="text" maxlength="20" placeholder="e.g. Dave" autocomplete="off" />

        <button id="btn-create" class="primary big">Create a Room</button>

        <div class="divider"><span>or join one</span></div>

        <div class="join-row">
          <input id="code-input" type="text" maxlength="4" placeholder="CODE" autocomplete="off" />
          <button id="btn-join" class="secondary">Join</button>
        </div>
        <p id="landing-error" class="error"></p>
      </div>
    </section>

    <!-- LOBBY -->
    <section id="screen-lobby" class="screen hidden">
      <div class="lobby-head">
        <p class="muted">Room code — share it with the room</p>
        <div class="code-display" id="lobby-code" title="Tap to copy">----</div>
        <p class="muted small">Up to 10 players · everyone on their own device</p>
      </div>
      <h2>Players</h2>
      <ul id="lobby-players" class="player-list"></ul>
      <button id="btn-start" class="primary big hidden">Start Game</button>
      <p id="lobby-hint" class="muted small"></p>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen hidden">
      <header class="game-header">
        <span class="room-tag" id="game-code">----</span>
        <span id="turn-banner" class="turn-banner"></span>
      </header>

      <!-- Active card in play -->
      <div id="active-area" class="active-area hidden">
        <div class="situation-card" id="active-card">
          <div class="card-label">Shitty Situation</div>
          <div class="card-text" id="active-card-text"></div>
          <div class="card-index hidden" id="active-card-index"></div>
        </div>
        <p id="active-prompt" class="active-prompt"></p>
      </div>

      <!-- Result toast / reveal -->
      <div id="result-banner" class="result-banner hidden"></div>

      <!-- Draw button for the active player -->
      <button id="btn-draw" class="primary big hidden">Draw a Card</button>

      <!-- Your Lane of Pain with guess slots -->
      <div id="my-lane-area" class="hidden">
        <h2>Your Lane of Pain <span class="muted small" id="my-score"></span></h2>
        <div id="my-lane" class="lane guessable"></div>
      </div>

      <!-- Everyone else -->
      <h2>Everyone's Lanes</h2>
      <div id="all-lanes"></div>

      <!-- Game over -->
      <div id="gameover" class="gameover hidden">
        <h1>👑</h1>
        <p id="gameover-text"></p>
        <button id="btn-newgame" class="secondary">Back to Start</button>
      </div>
    </section>

    <div id="toast" class="toast hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
